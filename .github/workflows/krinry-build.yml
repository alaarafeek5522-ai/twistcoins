name: krinry Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, profile, release]
      output_type:
        description: 'Output type'
        required: true
        default: 'apk'
        type: choice
        options: [apk, appbundle, apk-split]
      target_platform:
        description: 'Target platform'
        required: false
        default: 'all'
        type: choice
        options: [all, android-arm64, android-arm, android-x64]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Pub get
        run: flutter pub get

      - name: Create android folder
        run: flutter create --platforms android .

      - name: Add Internet Permission
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i 's/<application/\n    <uses-permission android:name="android.permission.INTERNET"\/>\n    <application/' "$MANIFEST"
          fi

      - name: Build
        run: |
          TYPE="${{ github.event.inputs.build_type }}"
          OUT="${{ github.event.inputs.output_type }}"
          PLAT="${{ github.event.inputs.target_platform }}"
          if [ "$OUT" = "apk" ]; then
            if [ "$PLAT" != "all" ]; then
              flutter build apk --$TYPE --target-platform $PLAT
            else
              flutter build apk --$TYPE
            fi
          elif [ "$OUT" = "apk-split" ]; then
            flutter build apk --$TYPE --split-per-abi
          elif [ "$OUT" = "appbundle" ]; then
            flutter build appbundle --$TYPE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/*/*.aab
          retention-days: 7
